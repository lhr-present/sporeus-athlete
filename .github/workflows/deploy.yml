name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # v9.79.0 — Assert the package.json↔CHANGELOG.md version offset.
      # Two-version system documented in CLAUDE.md → "Version System".
      # Relationship: pkg.major === changelog.major + 2; minor numbers match.
      - name: Version sync check
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          PKG_MAJOR="${PKG_VER%%.*}"
          PKG_REST="${PKG_VER#*.}"
          PKG_MINOR="${PKG_REST%%.*}"

          # Match the first heading like "## v9.X.Y — ..."
          CHG_LINE=$(grep -m1 '^## v[0-9]' CHANGELOG.md || true)
          CHG_VER=$(echo "$CHG_LINE" | sed -nE 's/^## v([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
          CHG_MAJOR="${CHG_VER%%.*}"
          CHG_REST="${CHG_VER#*.}"
          CHG_MINOR="${CHG_REST%%.*}"

          echo "package.json:   ${PKG_VER}  (major=${PKG_MAJOR} minor=${PKG_MINOR})"
          echo "CHANGELOG top:  v${CHG_VER}  (major=${CHG_MAJOR} minor=${CHG_MINOR})"

          if [ -z "$CHG_VER" ]; then
            echo "::error::Could not parse CHANGELOG.md top heading as a version"
            exit 1
          fi
          if [ "$((CHG_MAJOR + 2))" -ne "$PKG_MAJOR" ]; then
            echo "::error::Major offset broken — expected pkg.major === changelog.major + 2"
            echo "::error::pkg=${PKG_MAJOR} changelog=${CHG_MAJOR} (expected pkg=${CHG_MAJOR}+2=$((CHG_MAJOR + 2)))"
            exit 1
          fi
          if [ "$PKG_MINOR" != "$CHG_MINOR" ]; then
            echo "::error::Minor version drift — pkg=${PKG_MINOR} changelog=${CHG_MINOR}"
            echo "::error::package.json and CHANGELOG.md minor versions must match"
            exit 1
          fi
          echo "OK — version offset intact"
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRAVA_CLIENT_ID: ${{ secrets.VITE_STRAVA_CLIENT_ID }}
          # Must equal the Strava app's Authorization Callback Domain (app.sporeus.com).
          # If the secret is unset the client falls back to the live origin (also
          # https://app.sporeus.com/), so this is a deterministic override, not a new dep.
          VITE_STRAVA_REDIRECT_URI: ${{ secrets.VITE_STRAVA_REDIRECT_URI }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      - name: Bundle size gate (main chunk ≤ 150 KB gzipped)
        run: |
          MAIN_CHUNK=$(find dist/assets -name "index-*.js" -not -name "*.map" | head -1)
          if [ -z "$MAIN_CHUNK" ]; then
            echo "ERROR: No main chunk found in dist/assets/" && exit 1
          fi
          RAW=$(wc -c < "$MAIN_CHUNK")
          GZ=$(gzip -c "$MAIN_CHUNK" | wc -c)
          LIMIT=$((150 * 1024))
          echo "Main chunk: $MAIN_CHUNK — raw=${RAW}B gz=${GZ}B (gz limit: ${LIMIT})"
          if [ "$GZ" -gt "$LIMIT" ]; then
            echo "FAIL: Main chunk exceeds 150 KB gzipped (${GZ} > ${LIMIT})" && exit 1
          fi
          echo "PASS: Main chunk within 150 KB gzipped"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  e2e:
    needs: build
    runs-on: ubuntu-latest
    env:
      SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: E2E smoke tests
        if: ${{ env.SUPABASE_TEST_URL != '' }}
        run: npm run test:e2e
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_TEST_SERVICE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_KEY }}
          SUPABASE_TEST_ATHLETE_A: ${{ secrets.SUPABASE_TEST_ATHLETE_A }}
          SUPABASE_TEST_ATHLETE_A_PW: ${{ secrets.SUPABASE_TEST_ATHLETE_A_PW }}
          SUPABASE_TEST_ATHLETE_B: ${{ secrets.SUPABASE_TEST_ATHLETE_B }}
          SUPABASE_TEST_ATHLETE_B_PW: ${{ secrets.SUPABASE_TEST_ATHLETE_B_PW }}
          SUPABASE_TEST_COACH: ${{ secrets.SUPABASE_TEST_COACH }}
          SUPABASE_TEST_COACH_PW: ${{ secrets.SUPABASE_TEST_COACH_PW }}

  route-smoke:
    name: Route smoke gate (P3)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (stub Supabase for route smoke)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub_anon_key
          VITE_STRAVA_CLIENT_ID: "0"
          VITE_VAPID_PUBLIC_KEY: stub_vapid
          VITE_SENTRY_DSN: ""
      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium
      - name: Run route-smoke spec
        run: npx playwright test --config=playwright.route-smoke.config.js
        env:
          CI: "true"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: route-smoke-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [build, route-smoke]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
