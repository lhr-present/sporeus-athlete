name: Secret Scan

# Blocks new secrets from entering the repo. gitleaks-action scans the commit range of
# the triggering push/PR (not full history) — so the rotated historical service_role JWT
# does not perpetually fail the gate, while any NEW secret in a PR/commit fails CI.
# Public repo → no GITLEAKS_LICENSE required.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the action can diff the PR/push range
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
