    <!-- GitHub Pages SPA routing: restore path encoded by 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var url = new URL(window.location.href);
          var path = redirect.replace(/~and~/g, '&');
          window.history.replaceState(null, null, url.origin + path);
        }
        // Handle ?/ pattern from 404.html redirect
        var search = window.location.search;
        if (search && search.startsWith('?/')) {
          var path2 = '/' + search.slice(2).replace(/~and~/g, '&');
          window.history.replaceState(null, null, path2);
        }
      })();
    </script>
