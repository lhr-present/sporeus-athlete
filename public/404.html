<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sporeus</title>
  <script>
    // GitHub Pages SPA routing: redirect back to root with path encoded as query param.
    // App.jsx reads window.location.search on load and restores the path via history.replaceState.
    var seg = 0; // custom domain at root — no repo path prefix
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
