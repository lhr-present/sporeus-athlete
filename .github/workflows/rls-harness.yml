name: RLS Security Harness

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/rls/**"
      - ".github/workflows/rls-harness.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/rls/**"

concurrency:
  group: rls-harness-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  SUPABASE_PROJECT_ID: pvicqwapvvfempjdgwbm
  DENO_VERSION: "1.42.1"

jobs:
  # ── Job 1: Full Deno harness (220+ assertions against live project) ──────────
  rls-harness:
    name: RLS Policy Harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run RLS harness
        id: harness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          deno run \
            --allow-net \
            --allow-env \
            supabase/tests/rls/harness.ts 2>&1 | tee harness_output.txt
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.harness.outputs.exit_code }}';
            const passed   = exitCode === '0';
            let output = '';
            try { output = fs.readFileSync('harness_output.txt', 'utf8').split('\n').slice(-60).join('\n'); }
            catch { output = '(no output)'; }
            const body = `## ${passed ? '✅' : '🚨'} RLS Harness — ${passed ? 'All tests passed' : 'FAILURES DETECTED'}
            <details><summary>${passed ? 'View output' : '⚠️ Expand failures — merge BLOCKED'}</summary>

            \`\`\`
            ${output}
            \`\`\`
            </details>${!passed ? '\n\n> **Fix all RLS failures before merging.**' : ''}
            _Run: ${{ github.run_id }}_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('RLS Harness'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rls-harness-output-${{ github.run_id }}
          path: harness_output.txt
          retention-days: 14

  # ── Job 2: SQL-level isolation smoke (the 7 scenarios from debt session) ─────
  rls-sql-smoke:
    name: RLS SQL Isolation Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Seed test data
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase db query --linked \
            -f supabase/tests/rls/sql_smoke_seed.sql

      - name: Run 7-scenario isolation checks
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: pvicqwapvvfempjdgwbm
        run: python3 supabase/tests/rls/sql_smoke_runner.py

      - name: Cleanup test data
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase db query --linked \
            -f supabase/tests/rls/sql_smoke_cleanup.sql
