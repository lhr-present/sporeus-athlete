name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRAVA_CLIENT_ID: ${{ secrets.VITE_STRAVA_CLIENT_ID }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      - name: Bundle size gate (main chunk ≤ 150 KB)
        run: |
          MAIN_CHUNK=$(find dist/assets -name "index-*.js" -not -name "*.map" | head -1)
          if [ -z "$MAIN_CHUNK" ]; then
            echo "ERROR: No main chunk found in dist/assets/" && exit 1
          fi
          SIZE=$(wc -c < "$MAIN_CHUNK")
          LIMIT=$((150 * 1024))
          echo "Main chunk: $MAIN_CHUNK — ${SIZE} bytes (limit: ${LIMIT})"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "FAIL: Main chunk exceeds 150 KB limit (${SIZE} > ${LIMIT})" && exit 1
          fi
          echo "PASS: Main chunk within 150 KB limit"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
